<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>豆瓣自动转存</title>
<style>
:root {
  --bg:#000; --bg2:rgba(255,255,255,.03); --card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1);
  --text:#fff; --text2:rgba(255,255,255,.65); --text3:rgba(255,255,255,.35);
  --accent:#0a84ff; --accent2:#5e5ce6;
  --green:#30d158; --red:#ff453a; --orange:#ff9f0a; --purple:#bf5af2;
  --radius:18px; --radius-sm:12px; --radius-xs:8px;
  --blur:saturate(180%) blur(24px);
  --shadow:0 8px 32px rgba(0,0,0,.25);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  --mono:'SF Mono','Fira Code',monospace;
}
[data-theme="light"] {
  --bg:#f2f2f7; --bg2:rgba(255,255,255,.5); --card:rgba(255,255,255,.82);
  --border:rgba(0,0,0,.06); --border2:rgba(0,0,0,.1);
  --text:#1c1c1e; --text2:rgba(0,0,0,.55); --text3:rgba(0,0,0,.3);
  --accent:#007aff; --accent2:#5856d6;
  --green:#34c759; --red:#ff3b30; --orange:#ff9500; --purple:#af52de;
  --shadow:0 4px 20px rgba(0,0,0,.06);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;-webkit-font-smoothing:antialiased;line-height:1.5;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(10,132,255,.12) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(191,90,242,.08) 0%,transparent 50%);
}
.app{max-width:860px;margin:0 auto;padding:16px 20px;padding-bottom:100px;position:relative;z-index:1}

/* Header */
.header{
  position:sticky;top:0;z-index:100;display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;margin-bottom:16px;
  background:var(--blur);-webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  background-color:rgba(0,0,0,.35);
}
[data-theme="light"] .header{background-color:rgba(242,242,247,.7)}
.header h1{font-size:30px;font-weight:700;letter-spacing:2px;
  background:linear-gradient(135deg,rgba(255,255,255,.9) 0%,rgba(120,190,255,.8) 50%,rgba(200,150,255,.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
[data-theme="light"] .header h1{
  background:linear-gradient(135deg,rgba(60,60,70,.85) 0%,rgba(0,122,255,.7) 50%,rgba(175,82,222,.6) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header-btns{display:flex;gap:6px}
.icon-btn{
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
}
.icon-btn:hover{background:rgba(10,132,255,.12);border-color:var(--accent);color:var(--accent)}

/* Dashboard */
.dash{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px}
.dcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);
  padding:14px;text-align:center;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
}
.dcard .num{font-size:26px;font-weight:700;color:var(--text)}
.dcard .lbl{font-size:11px;color:var(--text3);margin-top:2px;font-weight:500}
.dcard .num.green{color:var(--green)}.dcard .num.blue{color:var(--accent)}.dcard .num.red{color:var(--red)}
@media(max-width:640px){.dash{grid-template-columns:repeat(2,1fr)}}

/* Segmented Control */
.tabs{display:flex;background:rgba(255,255,255,.04);border-radius:10px;padding:3px;margin-bottom:18px}
[data-theme="light"] .tabs{background:rgba(0,0,0,.04)}
.tab-btn{flex:1;padding:10px 8px;text-align:center;font-size:14px;font-weight:600;
  cursor:pointer;color:var(--text3);border-radius:8px;border:none;background:transparent;
  letter-spacing:-.2px;white-space:nowrap}
.tab-btn.active{background:var(--accent);color:#fff;box-shadow:0 2px 12px rgba(10,132,255,.3)}

/* Tab Content */
.tab-content{display:none;animation:fadeIn .25s ease}
.tab-content.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* Card */
.card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;margin-bottom:14px;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
}
.card-title{font-size:16px;font-weight:600;color:var(--text);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.card-title .badge{font-size:11px;padding:2px 8px;border-radius:20px;background:var(--accent);color:#fff;font-weight:600}
.sub-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px;margin-top:12px;display:flex;align-items:center;gap:8px}
.sub-title:first-child{margin-top:0}
.sel-all{font-size:11px;color:var(--accent);cursor:pointer;font-weight:500;margin-left:auto}
.sel-all:hover{text-decoration:underline}

/* Chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{padding:7px 14px;border-radius:20px;background:rgba(255,255,255,.04);border:1px solid var(--border);
  cursor:pointer;font-size:13px;font-weight:500;color:var(--text2);user-select:none;
  transition:all .15s ease}
[data-theme="light"] .chip{background:rgba(0,0,0,.03)}
.chip:hover{background:rgba(10,132,255,.08);border-color:rgba(10,132,255,.25)}
.chip.on{background:rgba(48,209,88,.15);border-color:rgba(48,209,88,.4);color:var(--green)}

/* Input */
input[type=number]{padding:8px 10px;border-radius:var(--radius-xs);border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--text);font-size:14px;width:72px;text-align:center;font-weight:600}
input[type=text],input[type=password]{width:100%;padding:12px;border-radius:var(--radius-sm);border:1px solid var(--border);
  background:rgba(255,255,255,.04);color:var(--text);font-size:14px}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(10,132,255,.15)}

/* Buttons */
.btn{padding:11px 22px;border-radius:var(--radius-xs);border:none;cursor:pointer;font-size:14px;font-weight:600;
  font-family:var(--font);transition:all .15s ease}
.btn:active{transform:scale(.97)}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{filter:brightness(1.1)}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:20px}
.btn-danger{background:rgba(255,69,58,.12);color:var(--red);border:1px solid rgba(255,69,58,.2)}
.btn-danger:hover{background:rgba(255,69,58,.2)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2)}
.btn-outline:hover{background:rgba(255,255,255,.04)}

.row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}

/* Toggle */
.toggle{position:relative;width:44px;height:26px;display:inline-block;cursor:pointer}
.toggle input{opacity:0;width:0;height:0}
.toggle .slider{position:absolute;inset:0;background:rgba(255,255,255,.1);border-radius:13px;transition:.2s}
.toggle .slider:before{content:'';position:absolute;width:22px;height:22px;left:2px;top:2px;
  background:#fff;border-radius:50%;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.toggle input:checked+.slider{background:var(--green)}
.toggle input:checked+.slider:before{transform:translateX(18px)}

/* Sched row */
.sched-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}

/* Filter */
.filter-tabs{display:flex;gap:6px;margin-bottom:12px}
.filter-tab{padding:6px 14px;border-radius:20px;border:1px solid var(--border);
  background:rgba(255,255,255,.03);cursor:pointer;font-size:13px;color:var(--text3);font-weight:500}
.filter-tab.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Progress */
.progress-wrap{height:4px;background:rgba(255,255,255,.06);border-radius:2px;overflow:hidden;margin-bottom:12px}
.progress-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .3s}
.progress-stats{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:12px}
.progress-stat{font-size:13px;color:var(--text3)}.progress-stat span{font-weight:600;color:var(--text)}

/* Log */
.log-box{
  background:#000;border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;
  max-height:360px;overflow-y:auto;font-family:var(--mono);font-size:12px;line-height:1.8;
  white-space:pre-wrap;color:var(--text2);position:relative
}
.log-box .ok{color:var(--green)}.log-box .sk{color:var(--text3)}.log-box .er{color:var(--red)}.log-box .inf{color:var(--accent)}
.log-pause{
  position:sticky;bottom:8px;float:right;padding:4px 10px;border-radius:12px;
  background:var(--accent);color:#fff;font-size:11px;cursor:pointer;font-family:var(--font);border:none;z-index:5
}

/* History */
.hist-item{padding:12px;border-radius:var(--radius-sm);background:rgba(255,255,255,.02);
  margin-bottom:6px;display:flex;align-items:center;gap:12px;border:1px solid var(--border)}
.hist-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.hist-icon.transfer{background:rgba(10,132,255,.12);color:var(--accent)}
.hist-icon.expired{background:rgba(255,159,10,.12);color:var(--orange)}
.hist-icon.cleanup{background:rgba(255,69,58,.12);color:var(--red)}
.hist-info{flex:1;min-width:0}
.hist-title{font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hist-meta{font-size:12px;color:var(--text3);margin-top:2px}
.hist-time{font-size:12px;color:var(--text3);white-space:nowrap}

/* Skeleton */
.skeleton{height:32px;border-radius:8px;background:rgba(255,255,255,.03);animation:shimmer 1.5s infinite}
@keyframes shimmer{0%{opacity:.5}50%{opacity:1}100%{opacity:.5}}

/* Dir */
.dir-item{display:flex;gap:8px;margin-bottom:8px}.dir-item input{flex:1}
.dir-del{width:30px;height:30px;display:flex;align-items:center;justify-content:center;
  background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.15);color:var(--red);
  border-radius:8px;cursor:pointer;font-size:18px;flex-shrink:0}

/* Sheet (Bottom Modal) */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;
  align-items:flex-end;justify-content:center}
.sheet-overlay.show{display:flex}
.sheet{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius) var(--radius) 0 0;
  width:100%;max-width:520px;max-height:80vh;overflow-y:auto;padding:20px;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  animation:slideUp .3s ease
}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet h3{font-size:18px;font-weight:600;margin-bottom:16px;color:var(--accent)}
.sheet .section-title{font-size:12px;color:var(--text3);font-weight:600;margin:16px 0 8px;text-transform:uppercase;letter-spacing:.5px}
.form-group{margin-bottom:12px}.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500}

/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);padding:10px 22px;
  border-radius:var(--radius-sm);font-size:14px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;
  background:var(--card);border:1px solid var(--border);color:var(--text);
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  transition:opacity .3s}
.toast.show{opacity:1}.toast.ok{border-color:rgba(48,209,88,.3)}.toast.err{border-color:rgba(255,69,58,.3)}

/* Scrollbar */
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}

/* Responsive */
@media(max-width:640px){
  .app{padding:12px 14px;padding-bottom:80px}
  .header h1{font-size:22px}
}
</style>
</head>
<body>
<div class="app">

<!-- Header -->
<div class="header">
  <h1>豆瓣自动转存 <span id="headerVersion" style="font-size:12px;font-weight:400;color:var(--text3);margin-left:6px">v1.0.0</span></h1>
  <div class="header-btns">
    <button class="icon-btn" onclick="openSearch()" title="搜索">🔍</button>
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="切换主题">🌙</button>
    <button class="icon-btn" onclick="openSettings()" title="设置">⚙</button>
  </div>
</div>

<!-- Dashboard -->
<div class="dash">
  <div class="dcard">
    <div class="num blue" id="dashToday">-</div>
    <div class="lbl">今日转存</div>
  </div>
  <div class="dcard" style="font-size:12px;line-height:1.8">
    <div id="dashNext" style="color:var(--text2)">加载中...</div>
  </div>
  <div class="dcard">
    <div class="num" id="dashLastStatus" style="font-size:20px">-</div>
    <div class="lbl" id="dashLastTime">上次转存</div>
  </div>
  <div class="dcard" style="font-size:12px;line-height:1.8">
    <div style="color:var(--text2);margin-bottom:4px">近 7 天</div>
    <div><span style="color:var(--accent)" id="dash7OK">0</span> 成功 / <span style="color:var(--text2)" id="dash7Fail">0</span> 失败</div>
    <div style="color:var(--text2);font-size:11px;margin-top:2px">共 <span id="dash7Total">0</span> 次执行</div>
  </div>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('manual')">手动转存</button>
  <button class="tab-btn" onclick="switchTab('schedule')">定时任务</button>
  <button class="tab-btn" onclick="switchTab('history')">执行历史</button>
</div>

<!-- ===== 手动转存 ===== -->
<div class="tab-content active" id="tabManual">
  <div class="card">
    <div class="card-title">🎬 电影</div>
    <div id="catsMovie"></div>
  </div>
  <div class="card">
    <div class="card-title">📺 电视剧</div>
    <div id="catsTV"></div>
  </div>
  <div class="card">
    <div class="card-title">🎭 综艺</div>
    <div id="catsVariety"></div>
  </div>
  <div class="card">
    <div class="row">
      <span style="color:var(--text2)">每次最多</span>
      <input type="number" id="limit" value="5" min="1" max="50">
      <span style="color:var(--text2)">条</span>
      <button class="btn btn-primary" onclick="startTransfer()">开始转存</button>
      <button class="btn btn-outline btn-sm" onclick="checkExpired()">检测失效链接</button>
      <button class="btn btn-outline btn-sm" style="margin-left:auto" onclick="syncToSchedule()">同步到定时任务</button>
    </div>
  </div>
  <div class="card" id="logCard" style="display:none">
    <div class="card-title" style="justify-content:space-between">
      执行日志
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-danger" id="stopBtn" onclick="stopTransfer()">停止</button>
        <button class="btn btn-sm btn-outline" id="pauseBtn" onclick="togglePause()">⏸</button>
      </div>
    </div>
    <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="progress-stats">
      <div class="progress-stat">已搜 <span id="stSearched">0</span></div>
      <div class="progress-stat"><span style="color:var(--green)">成功 <span id="stOK">0</span></span></div>
      <div class="progress-stat">跳过 <span id="stSkip">0</span></div>
      <div class="progress-stat"><span style="color:var(--red)">失败 <span id="stFail">0</span></span></div>
      <div class="progress-stat">共 <span id="stTotal">0</span></div>
    </div>
    <div class="filter-tabs" style="margin-bottom:8px">
      <span class="filter-tab active" onclick="setLogFilter(this,'all')">全部</span>
      <span class="filter-tab" onclick="setLogFilter(this,'ok')">成功</span>
      <span class="filter-tab" onclick="setLogFilter(this,'skip')">跳过</span>
      <span class="filter-tab" onclick="setLogFilter(this,'fail')">失败</span>
    </div>
    <div class="log-box" id="log"><div style="color:var(--text3);text-align:center;padding:20px;font-family:var(--font)">暂无日志</div></div>
  </div>
</div>

<!-- ===== 定时任务 ===== -->
<div class="tab-content" id="tabSchedule">
  <div class="card">
    <div class="card-title">🎬 电影</div>
    <div id="schedCatsMovie"></div>
  </div>
  <div class="card">
    <div class="card-title">📺 电视剧</div>
    <div id="schedCatsTV"></div>
  </div>
  <div class="card">
    <div class="card-title">🎭 综艺</div>
    <div id="schedCatsVariety"></div>
  </div>
  <div class="card">
    <div class="card-title">转存设置</div>
    <div class="sched-row">
      <label class="toggle"><input type="checkbox" id="schedTOn" onchange="autoSaveSchedule()"><span class="slider"></span></label>
      <span style="color:var(--text2)">启用</span>
      <span style="color:var(--text2);margin-left:8px">上限</span>
      <input type="number" id="schedLimit" value="5" min="1" max="50" onchange="autoSaveSchedule()">
      <span style="color:var(--text2)">条</span>
      <span style="color:var(--text2);margin-left:8px">时间</span>
      <select id="schedTHour" onchange="autoSaveSchedule()" style="padding:7px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px"></select>
      <span style="color:var(--text3)">:</span>
      <select id="schedTMin" onchange="autoSaveSchedule()" style="padding:7px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px"></select>
    </div>
  </div>
  <div class="card">
    <div class="card-title">失效检测</div>
    <div class="sched-row">
      <label class="toggle"><input type="checkbox" id="schedEOn" onchange="autoSaveSchedule()"><span class="slider"></span></label>
      <span style="color:var(--text2)">启用</span>
      <span style="color:var(--text2);margin-left:8px">时间</span>
      <select id="schedEHour" onchange="autoSaveSchedule()" style="padding:7px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px"></select>
      <span style="color:var(--text3)">:</span>
      <select id="schedEMin" onchange="autoSaveSchedule()" style="padding:7px 8px;border-radius:8px;border:1px solid var(--border);background:rgba(255,255,255,.04);color:var(--text);font-size:14px"></select>
    </div>
    <div id="expiredDirList" style="margin-top:10px"></div>
    <button class="btn btn-outline btn-sm" style="margin-top:8px;border-style:dashed" onclick="addExpiredDir()">+ 添加目录</button>
  </div>
</div>

<!-- ===== 执行历史 ===== -->
<div class="tab-content" id="tabHistory">
  <div class="card">
    <div class="card-title" style="justify-content:space-between">执行历史 <div><button class="btn btn-sm btn-outline" onclick="clearExecHistory()" style="margin-right:6px">清除</button><button class="btn btn-sm btn-outline" onclick="exportHistory()">导出</button></div></div>
    <div class="filter-tabs">
      <span class="filter-tab active" onclick="filterHist('all',this)">全部</span>
      <span class="filter-tab" onclick="filterHist('transfer',this)">转存</span>
      <span class="filter-tab" onclick="filterHist('expired_check',this)">检测</span>
    </div>
    <div id="execHistoryList"><div style="text-align:center;padding:40px;color:var(--text3)">加载中...</div></div>
  </div>
</div>
</div>

<!-- Settings Sheet -->
<div class="sheet-overlay" id="settingsModal" onclick="if(event.target===this)closeSettings()">
  <div class="sheet">
    <h3>系统设置</h3>
    <div class="section-title">🔍 搜索服务</div>
    <div class="form-group"><label>PanSou 地址</label><input type="text" id="cfg_pansou" placeholder="http://192.168.1.1:8080"></div>
    <div class="section-title">📦 转存服务</div>
    <div class="form-group"><label>QAS 地址</label><input type="text" id="cfg_qas" placeholder="http://192.168.1.1:5005"></div>
    <div class="form-group"><label>QAS Token</label><input type="password" id="cfg_qas_token" placeholder="留空不修改" onchange="autoSaveConfig()"></div>
    <div class="section-title">🔐 管理认证</div>
    <div class="form-group"><label>用户名</label><input type="text" id="cfg_auth_user" placeholder="root"></div>
    <div class="form-group"><label>密码</label><input type="password" id="cfg_auth_pass" placeholder="留空不修改"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px">
      <button class="btn btn-outline btn-sm" onclick="closeSettings()">取消</button>
      <button class="btn btn-primary btn-sm" onclick="saveConfig(false)">保存</button>
    </div>
  </div>
</div>

<!-- Search Sheet -->
<div class="sheet-overlay" id="searchModal" onclick="if(event.target===this)closeSearch()">
  <div class="sheet">
    <h3>搜索资源</h3>
    <div class="form-group"><input type="text" id="searchInput" placeholder="输入关键词搜索夸克网盘资源..." oninput="onSearchInput()"></div>
    <div class="form-group"><label>保存路径</label><input type="text" id="searchPath" value="/批量转存/手动搜索存" onchange="localStorage.setItem('search_path',this.value)"></div>
    <div class="sched-row" style="margin-bottom:4px">
      <label class="toggle"><input type="checkbox" id="searchValidate" onchange="localStorage.setItem('search_validate',this.checked?'1':'0')"><span class="slider"></span></label>
      <span style="color:var(--text2);font-size:13px">验证链接有效性（较慢）</span>
    </div>
    <div id="searchResults"></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:12px">
      <button class="btn btn-outline btn-sm" onclick="closeSearch()">关闭</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ============ Auth ============
var TOKEN = localStorage.getItem('auth_token')||'';
if(!TOKEN){location.href='/login.html'}
function authHeaders(){return{'X-Auth-Token':TOKEN}}
async function apiGet(url){
  var r = await fetch(url,{headers:authHeaders()});
  if(r.status===401){TOKEN='';localStorage.removeItem('auth_token');location.href='/login.html';throw new Error('401')}
  return r.json()
}
async function apiPost(url,body){
  var r = await fetch(url,{method:'POST',headers:{...authHeaders(),'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(r.status===401){TOKEN='';localStorage.removeItem('auth_token');location.href='/login.html';throw new Error('401')}
  return r.json()
}

// ============ Theme ============
function initTheme(){
  var t = localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  document.getElementById('themeBtn').textContent = t==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.getElementById('themeBtn').textContent = next==='dark'?'🌙':'☀️';
}

// ============ Global ============
var C = {}, currentTab = 'manual', execHistoryData = [], execHistoryFilter = 'all';
var expiredDirEntries = [], autoSaveTimer = null, logPollTimer = null;
var logBefore = [], logFilter = 'all', logPaused = false;

// ============ Toast ============
function showToast(msg,ok){
  var t = document.getElementById('toast'); t.textContent = msg;
  t.className = 'toast '+(ok?'ok':'err')+' show';
  setTimeout(function(){t.classList.remove('show')},2500);
}

// ============ Tab ============
function switchTab(tab){
  currentTab = tab;
  var idx = tab==='manual'?0:tab==='schedule'?1:2;
  document.querySelectorAll('.tab-btn').forEach(function(b,i){
    b.classList.toggle('active', i===idx);
  });
  document.getElementById('tabManual').classList.toggle('active', tab==='manual');
  document.getElementById('tabSchedule').classList.toggle('active', tab==='schedule');
  document.getElementById('tabHistory').classList.toggle('active', tab==='history');
  if(tab==='schedule')loadSchedule();
  if(tab==='history')loadExecHistory();
}

// ============ Categories ============
function parseCategories(){
  for(var gk in C){
    var g = C[gk]; var h = '';
    for(var sn in g.subs){
      var s = g.subs[sn];
      h += '<div class="sub-title">'+sn+' <span class="sel-all" onclick="toggleSub(this)">全选</span></div><div class="chips">';
      for(var ti=0; ti<s.types.length; ti++){
        var t = s.types[ti];
        var id = gk+'_'+sn.replace(/\s/g,'_')+'_'+t.replace(/\s/g,'_');
        h += '<span class="chip" id="c_manual_'+id+'" data-id="'+id+'" data-path="'+s.path+'" data-type="'+t+'" data-group="'+gk+'" data-gname="'+g.name+'" onclick="toggleChip(this)">'+t+'</span>';
      }
      h += '</div>';
    }
    var el = null;
    if(gk==='movie')el=document.getElementById('catsMovie');
    else if(gk==='tv')el=document.getElementById('catsTV');
    else el=document.getElementById('catsVariety');
    if(el)el.innerHTML = h;
  }
}

function parseSchedCats(){
  for(var gk in C){
    var g = C[gk]; var h = '';
    for(var sn in g.subs){
      var s = g.subs[sn];
      h += '<div class="sub-title">'+sn+' <span class="sel-all" onclick="toggleSubSched(this)">全选</span></div><div class="chips">';
      for(var ti=0; ti<s.types.length; ti++){
        var t = s.types[ti];
        var id = 'sch_'+gk+'_'+sn.replace(/\s/g,'_')+'_'+t.replace(/\s/g,'_');
        h += '<span class="chip" id="c_'+id+'" data-id="'+id+'" data-path="'+s.path+'" data-type="'+t+'" data-group="'+gk+'" data-gname="'+g.name+'" onclick="toggleSchedChip(this)">'+t+'</span>';
      }
      h += '</div>';
    }
    var el = null;
    if(gk==='movie')el=document.getElementById('schedCatsMovie');
    else if(gk==='tv')el=document.getElementById('schedCatsTV');
    else el=document.getElementById('schedCatsVariety');
    if(el)el.innerHTML = h;
  }
}

function toggleChip(el){el.classList.toggle('on')}
function toggleSchedChip(el){el.classList.toggle('on');autoSaveSchedule()}

function toggleSub(btn){
  var chips = btn.parentElement.nextElementSibling.querySelectorAll('.chip');
  var all = true;
  for(var i=0;i<chips.length;i++){if(!chips[i].classList.contains('on')){all=false;break}}
  for(var i=0;i<chips.length;i++){if(all)chips[i].classList.remove('on');else chips[i].classList.add('on')}
}
function toggleSubSched(btn){
  var chips = btn.parentElement.nextElementSibling.querySelectorAll('.chip');
  var all = true;
  for(var i=0;i<chips.length;i++){if(!chips[i].classList.contains('on')){all=false;break}}
  for(var i=0;i<chips.length;i++){if(all)chips[i].classList.remove('on');else chips[i].classList.add('on')}
  autoSaveSchedule();
}

function getSelectedTasks(prefix){
  var tasks=[], seen=new Set();
  document.querySelectorAll('#'+prefix+' .chip.on').forEach(function(el){
    var k = el.dataset.path+'/'+el.dataset.type;
    if(seen.has(k))return; seen.add(k);
    tasks.push({path:el.dataset.path, type:el.dataset.type, savepath:'/影视/'+el.dataset.gname, category:el.dataset.group});
  });
  return tasks;
}

function syncToSchedule(){
  document.querySelectorAll('#tabSchedule .chip').forEach(function(c){c.classList.remove('on')});
  var manual = document.querySelectorAll('#tabManual .chip.on');
  var paths = new Set();
  manual.forEach(function(m){
    var key = m.dataset.path+'/'+m.dataset.type;
    paths.add(key);
  });
  document.querySelectorAll('#tabSchedule .chip').forEach(function(c){
    var key = c.dataset.path+'/'+c.dataset.type;
    if(paths.has(key))c.classList.add('on');
  });
  autoSaveSchedule();
  showToast('已同步到定时任务',true);
}

// ============ Transfer ============
async function startTransfer(){
  var tasks = getSelectedTasks('tabManual');
  if(!tasks.length){showToast('请至少选择一个榜单',false);return}
  var limit = parseInt(document.getElementById('limit').value)||5;
  try{
    var d = await apiPost('/api/transfer',{tasks:tasks,limit:limit});
    if(d.success){
      document.getElementById('logCard').style.display='block';
      document.getElementById('stopBtn').style.display='inline-block';
      logBefore=[]; document.getElementById('log').innerHTML='';
      addLog('[开始转存]');
      startLogPoll();
    }
    else{
      document.getElementById('stopBtn').style.display='none';
      if(d.conflict){addLog('已有任务在运行，恢复监控...');checkRunningStatus()}
      else addLog(d.message||'启动失败');
    }
  }catch(e){addLog('请求失败: '+e.message);document.getElementById('stopBtn').style.display='none'}
}

async function stopTransfer(){
  try{await apiPost('/api/stop')}catch(e){}
  addLog('任务已终止');
  document.getElementById('stopBtn').style.display='none';
  if(logPollTimer){clearInterval(logPollTimer);logPollTimer=null}
}

// ============ Log ============
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

function addLog(line){
  logBefore.push(line);
  if(matchFilter(line)) appendLine(line);
}
function matchFilter(line){
  if(logFilter==='all')return true;
  if(logFilter==='ok')return line.indexOf('成功')>=0||line.indexOf('完成')>=0||line.indexOf('已执行')>=0;
  if(logFilter==='skip')return line.indexOf('跳过')>=0||line.indexOf('已存在')>=0||line.indexOf('exists')>=0;
  if(logFilter==='fail')return line.indexOf('失败')>=0||line.indexOf('未找到')>=0||line.indexOf('错误')>=0||line.indexOf('not found')>=0||line.indexOf('error')>=0;
  return true;
}
function renderLog(){
  var el = document.getElementById('log'); el.innerHTML='';
  for(var i=0;i<logBefore.length;i++){if(matchFilter(logBefore[i])) appendLine(logBefore[i])}
  if(!logPaused){el.scrollTop=el.scrollHeight}
}
function appendLine(line){
  var el = document.getElementById('log');
  var cls='inf';
  if(line.indexOf('成功')>=0||line.indexOf('完成')>=0||line.indexOf('已执行')>=0)cls='ok';
  else if(line.indexOf('失败')>=0||line.indexOf('未找到')>=0||line.indexOf('not found')>=0||line.indexOf('错误')>=0||line.indexOf('error')>=0)cls='er';
  else if(line.indexOf('跳过')>=0||line.indexOf('已存在')>=0||line.indexOf('exists')>=0)cls='sk';
  else if(line.indexOf('找到')>=0)cls='inf';
  el.innerHTML+='<div class="log-line '+cls+'">'+esc(line)+'</div>';
  if(!logPaused)el.scrollTop=el.scrollHeight;
}
function setLogFilter(btn,type){
  logFilter=type;
  document.querySelectorAll('#logCard .filter-tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  renderLog();
}
function togglePause(){
  logPaused=!logPaused;
  document.getElementById('pauseBtn').textContent=logPaused?'▶':'⏸';
}

function startLogPoll(){
  if(logPollTimer)clearInterval(logPollTimer);
  logPollTimer = setInterval(async function(){
    if(document.getElementById('logCard').style.display==='none')return;
    try{
      var d = await apiGet('/api/transfer/status');
      if(!d.running&&logPollTimer){clearInterval(logPollTimer);logPollTimer=null;
        document.getElementById('stopBtn').style.display='none';addLog('全部完成');}
    }catch(e){}
  },3000);
}
function updateProgress(stats){
  var total=(stats.total||0), done=(stats.ok||0)+(stats.skipped||0)+(stats.failed||0);
  var pct=total>0?Math.round(done/total*100):0;
  var fill=document.getElementById('progressFill');if(fill)fill.style.width=pct+'%';
}

async function checkRunningStatus(){
  try{
    var d = await apiGet('/api/transfer/status');
    if(d.running){
      document.getElementById('logCard').style.display='block';
      document.getElementById('stopBtn').style.display='inline-block';
      if(d.progress&&d.progress.length>0){logBefore=[];for(var i=0;i<d.progress.length;i++)addLog(d.progress[i])}
      startLogPoll();
    }
  }catch(e){}
}
async function checkExpired(){
  document.getElementById('logCard').style.display='block'; logBefore=[]; document.getElementById('log').innerHTML='';
  addLog('正在检测失效链接...');
  try{
    var d = await apiGet('/api/check_expired');
    if(d.expired&&d.expired.length>0){
      addLog('发现 '+d.expired.length+' 个失效链接');
      for(var i=0;i<d.expired.length;i++)addLog('  '+d.expired[i].taskname);
      addLog('开始搜索并替换失效链接...');
      var fd = await apiGet('/api/fix_expired');
      if(!fd.success)addLog('启动修复失败: '+fd.message);
    }else addLog('所有链接正常');
  }catch(e){addLog('检测失败: '+e.message)}
}

// ============ Schedule ============
async function loadSchedule(){
  try{
    var d = await apiGet('/api/schedule');
    if(d.transfer){
      document.getElementById('schedTOn').checked = !!d.transfer.enabled;
      document.getElementById('schedLimit').value = d.transfer.limit||5;
      if(d.transfer.time){var p=d.transfer.time.split(':');
        document.getElementById('schedTHour').value=parseInt(p[0])||0;
        document.getElementById('schedTMin').value=parseInt(p[1])||0;}
      if(d.transfer.tasks&&d.transfer.tasks.length>0){
        var savedPaths = new Set();
        d.transfer.tasks.forEach(function(t){savedPaths.add(t.path+'/'+t.type)});
        document.querySelectorAll('#tabSchedule .chip').forEach(function(el){
          if(savedPaths.has(el.dataset.path+'/'+el.dataset.type))el.classList.add('on');
        });
      }
    }
    if(d.expired_check){document.getElementById('schedEOn').checked=!!d.expired_check.enabled;
      if(d.expired_check.time){var e2=d.expired_check.time.split(':');
        document.getElementById('schedEHour').value=parseInt(e2[0])||0;
        document.getElementById('schedEMin').value=parseInt(e2[1])||0;}
      expiredDirEntries=(d.expired_check.directories&&d.expired_check.directories.length>0)?[...d.expired_check.directories]:[''];renderExpiredDirs();}
  }catch(e){showToast('加载调度失败',false)}
}

function autoSaveSchedule(){clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(saveSchedule,600)}
async function saveSchedule(){
  var tasks = getSelectedTasks('tabSchedule');
  var expiredDirs = expiredDirEntries.map(function(d){return d.trim()}).filter(function(d){return d});
  var body = {
    transfer:{enabled:document.getElementById('schedTOn').checked,
              time:pad2(document.getElementById('schedTHour').value)+':'+pad2(document.getElementById('schedTMin').value),
              limit:parseInt(document.getElementById('schedLimit').value)||5,tasks:tasks},
    expired_check:{enabled:document.getElementById('schedEOn').checked,
                   time:pad2(document.getElementById('schedEHour').value)+':'+pad2(document.getElementById('schedEMin').value),
                   directories:expiredDirs}
  };
  try{var d=await apiPost('/api/schedule',body);if(d.success){showToast('已保存',true)}}
  catch(e){showToast('保存失败',false)}
}
function pad2(n){return String(n).padStart(2,'0')}
function renderExpiredDirs(){
  var el=document.getElementById('expiredDirList'),h='';
  expiredDirEntries.forEach(function(d,i){h+='<div class="dir-item"><input type="text" value="'+d.replace(/"/g,'&quot;')+'" placeholder="/影视/电视剧" onchange="expiredDirEntries['+i+']=this.value;autoSaveSchedule()"><span class="dir-del" onclick="removeExpiredDir('+i+')">×</span></div>'});
  el.innerHTML=h;
}
function addExpiredDir(){expiredDirEntries.push('');renderExpiredDirs();autoSaveSchedule()}
function removeExpiredDir(i){expiredDirEntries.splice(i,1);if(!expiredDirEntries.length)expiredDirEntries=[''];renderExpiredDirs();autoSaveSchedule()}

// ============ Exec History ============
var histPage=0, histMore=true;
async function loadExecHistory(){
  histPage=1;histMore=true;
  var data = await apiGet('/api/exec_history?limit=50');
  execHistoryData = data.items || data || [];
  if(execHistoryData.length < 50) histMore=false;
  renderExecHistory();
}
async function loadMoreHistory(){
  if(!histMore)return; histPage++;
  var data = await apiGet('/api/exec_history?limit=50&page='+histPage);
  var more = data.items || data || [];
  if(more.length===0){histMore=false;return}
  execHistoryData = execHistoryData.concat(more);
  if(more.length<50)histMore=false;
  renderExecHistory();
}
function renderExecHistory(){
  var el = document.getElementById('execHistoryList');
  var filtered = execHistoryData;
  if(execHistoryFilter!=='all')filtered=execHistoryData.filter(function(h){return h.type===execHistoryFilter});
  if(!filtered.length){el.innerHTML='<div style=\"text-align:center;padding:40px;color:var(--text3);font-family:var(--font)\">暂无记录</div>';return}
  el.innerHTML = filtered.reverse().map(function(h){
    var icon='📋',cls='transfer',tn='转存';
    if(h.type==='expired_check'){icon='🔍';cls='expired';tn='检测'}
    var hasDetail = h.data && (h.data.results || h.data.expired);
    var cursor = hasDetail ? 'cursor:pointer' : '';
    return '<div class=\"hist-item\" style=\"'+cursor+'\" onclick=\"toggleHistDetail(\''+h.id+'\')\" id=\"hist_'+h.id+'\">'+
      '<div class=\"hist-icon '+cls+'\">'+icon+'</div>'+
      '<div class=\"hist-info\">'+
        '<div class=\"hist-title\">'+esc(h.detail)+'</div>'+
        '<div class=\"hist-meta\">'+tn+(hasDetail?' · 点击查看详情':'')+'</div>'+
      '</div>'+
      '<div class=\"hist-time\">'+h.time+'</div>'+
      '</div>'+
      '<div class=\"hist-detail\" id=\"hist_detail_'+h.id+'\" style=\"display:none;padding:0 16px 16px 60px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.02)\">'+
        renderHistDetailContent(h)+
      '</div>';
  }).join('');
  if(histMore)el.innerHTML+='<div style=\"text-align:center;padding:12px;margin-top:6px\"><button class=\"btn btn-outline btn-sm\" onclick=\"loadMoreHistory()\">加载更多</button></div>';
}
function renderHistDetailContent(h){
  if(!h.data) return '<div style=\"color:var(--text3);font-size:13px\">无详情</div>';
  if(h.type==='transfer' && h.data.results){
    var items = h.data.results;
    if(!items || !items.length) return '<div style=\"color:var(--text3);font-size:13px\">无数据</div>';
    return '<div style=\"max-height:300px;overflow-y:auto\">'+
      items.map(function(r){
        var st = r.status;
        var stText='未知', stClr='var(--text2)';
        if(st==='ok'||st==='done'){stText='成功';stClr='#30d158'}
        else if(st==='skipped'||st==='exists'){stText='跳过';stClr='var(--text3)'}
        else if(st==='not_found'){stText='未找到';stClr='#ff9f0a'}
        else if(st==='error'||st==='fail'){stText='失败';stClr='#ff453a'}
        var cat = r.category ? '<span style=\"padding:1px 6px;border-radius:4px;background:rgba(10,132,255,.1);color:var(--accent);font-size:10px;margin-right:6px\">'+esc(r.category)+'</span>' : '';
        return '<div style=\"padding:6px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:8px\">'+
          '<div style=\"flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13px\">'+cat+esc(r.title)+'</div>'+
          '<span style=\"font-size:12px;color:'+stClr+';flex-shrink:0\">'+stText+'</span>'+
          '</div>';
      }).join('')+
      '</div>';
  }
  if(h.type==='expired_check' && h.data.expired){
    var items = h.data.expired;
    if(!items || !items.length) return '<div style=\"color:#30d158;font-size:13px\">所有链接正常</div>';
    return '<div style=\"max-height:300px;overflow-y:auto\">'+
      items.map(function(r){
        return '<div style=\"padding:6px 0;border-bottom:1px solid var(--border);font-size:13px\">'+
          '<div style=\"color:#ff453a\">'+esc(r.title||'未知')+'</div>'+
          '<div style=\"color:var(--text3);font-size:12px;margin-top:2px\">'+esc(r.path||'')+'</div>'+
          (r.msg?'<div style=\"color:var(--text2);font-size:12px;margin-top:2px\">'+esc(r.msg)+'</div>':'')+
          '</div>';
      }).join('')+
      '</div>';
  }
  return '<div style=\"color:var(--text3);font-size:13px\">无详情</div>';
}
function toggleHistDetail(id){
  var detailEl = document.getElementById('hist_detail_'+id);
  if(!detailEl) return;
  var itemEl = document.getElementById('hist_'+id);
  if(detailEl.style.display === 'none'){
    detailEl.style.display = 'block';
    if(itemEl) itemEl.style.borderBottom = 'none';
  }else{
    detailEl.style.display = 'none';
    if(itemEl) itemEl.style.borderBottom = '';
  }
}
function filterHist(type,btn){
  execHistoryFilter=type;
  document.querySelectorAll('#tabHistory .filter-tab').forEach(function(t){t.classList.remove('active')});
  btn.classList.add('active');
  renderExecHistory();
}
async function exportHistory(){
  try{var r=await fetch('/api/history/export',{headers:authHeaders()});var blob=await r.blob();
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='exec_history.json';a.click()}
  catch(e){showToast('导出失败',false)}
}
async function clearExecHistory(){
  if(!confirm('确定要清空所有执行历史吗？此操作不可撤销。'))return;
  try{
    var d=await apiPost('/api/exec_history/manage',{action:'clear'});
    if(d.success){
      execHistoryData=[];histMore=false;renderExecHistory();
      showToast('已清空执行历史',true);
    }else showToast(d.message||'清空失败',false);
  }catch(e){showToast('清空失败',false)}
}

// ============ Settings ============
function openSettings(){document.getElementById('settingsModal').classList.add('show');loadConfig()}
function closeSettings(){document.getElementById('settingsModal').classList.remove('show')}
async function loadConfig(){
  try{var cfg=await apiGet('/api/config');
    document.getElementById('cfg_pansou').value=cfg.pansou||'';
    document.getElementById('cfg_qas').value=cfg.qas||'';
    document.getElementById('cfg_qas_token').value='';
    document.getElementById('cfg_auth_user').value=cfg.auth_user||'';
    document.getElementById('cfg_auth_pass').value='';
  }catch(e){}
}
async function saveConfig(silent=false){
  var cfg={pansou:document.getElementById('cfg_pansou').value.trim(),
           qas:document.getElementById('cfg_qas').value.trim(),
           qas_token:document.getElementById('cfg_qas_token').value,
           auth_user:document.getElementById('cfg_auth_user').value.trim(),
           auth_pass:document.getElementById('cfg_auth_pass').value};
  try{var d=await apiPost('/api/config',cfg);if(d.success){if(!silent)showToast('设置已保存',true);if(!silent)closeSettings()}else showToast(d.message||'保存失败',false)}
  catch(e){showToast('保存失败',false)}
}
var configSaveTimer=null;
function autoSaveConfig(){clearTimeout(configSaveTimer);configSaveTimer=setTimeout(saveConfig,800)}

// ============ Search ============
function openSearch(){document.getElementById('searchModal').classList.add('show');document.getElementById('searchInput').focus();
  var sp=document.getElementById('searchPath');sp.value=localStorage.getItem('search_path')||sp.value;
  document.getElementById('searchValidate').checked = localStorage.getItem('search_validate')==='1'}
function closeSearch(){document.getElementById('searchModal').classList.remove('show')}
var searchTimer=null;
function onSearchInput(){clearTimeout(searchTimer);var q=document.getElementById('searchInput').value.trim();
  if(!q){document.getElementById('searchResults').innerHTML='';return}
  searchTimer=setTimeout(doSearch,500)}
async function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  var el=document.getElementById('searchResults');
  el.innerHTML='<div style=\"text-align:center;padding:20px;color:var(--text3)\">搜索中...</div>';
  try{var validate = document.getElementById('searchValidate').checked?'&validate=1':'';
    var d=await apiGet('/api/search?q='+encodeURIComponent(q)+validate);
    if(!d.success||!d.results||!d.results.length){el.innerHTML='<div style=\"text-align:center;padding:20px;color:var(--text3)\">未找到资源</div>';return}
    el.innerHTML=d.results.map(function(r){return '<div style=\"display:flex;align-items:center;justify-content:space-between;padding:10px;border-radius:var(--radius-sm);background:rgba(255,255,255,.02);margin-bottom:6px\"><div style=\"flex:1;min-width:0\"><div style=\"font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">'+esc(r.title)+'</div><div style=\"font-size:12px;color:var(--text3)\">'+esc(r.source||'夸克网盘')+'</div></div><button class=\"btn btn-sm btn-primary\" onclick=\"transferOne(this)\" data-title=\"'+esc(r.title)+'\" data-url=\"'+esc(r.url)+'\">转存</button></div>'}).join('')}
  catch(e){el.innerHTML='<div style=\"text-align:center;padding:20px;color:var(--red)\">搜索失败</div>'}}

async function transferOne(btn){
  var title = btn.dataset.title;
  var url = btn.dataset.url;
  var savepath = (document.getElementById('searchPath').value||'').trim()||'/批量转存/手动搜索存';
  localStorage.setItem('search_path',savepath);
  btn.disabled=true; btn.textContent='转存中...';
  try{
    var r = await apiPost('/api/transfer_one',{title:title, url:url, savepath:savepath});
    if(r.success){showToast('已提交转存: '+title,true); btn.textContent='已转存'; btn.className='btn btn-sm btn-outline'}
    else{showToast(r.message||'失败',false); btn.disabled=false; btn.textContent='转存'}
  }catch(e){showToast('请求失败',false); btn.disabled=false; btn.textContent='转存'}
}

// ============ Dashboard ============
async function loadDashboard(){
  try{
    var s = await apiGet('/api/schedule');
    if(s._status){
      var ss=s._status, h='<div style=\"display:grid;grid-template-columns:60px 1fr;gap:2px 8px\">';
      if(ss.transfer_next) h+='<span>📋 转存</span><span style=\"text-align:right;color:var(--text2)\">'+ss.transfer_next.slice(5)+'</span>';
      if(ss.expired_check_next) h+='<span>🔍 检测</span><span style=\"text-align:right;color:var(--text2)\">'+ss.expired_check_next.slice(5)+'</span>';
      h+='</div>';
      document.getElementById('dashNext').innerHTML = h||'暂无调度';
    }
    var hist = await apiGet('/api/exec_history?limit=500');
    var items = hist.items || hist;
    var today = new Date();
    today.setHours(0,0,0,0);
    var todayStr = today.getFullYear()+'-'+String(today.getMonth()+1).padStart(2,'0')+'-'+String(today.getDate()).padStart(2,'0');
    var todayCount = 0;
    var lastTransfer = null;
    var days7OK = 0, days7Fail = 0, days7Total = 0;
    var sevenDaysAgo = new Date(today.getTime() - 7*24*60*60*1000);
    for(var i=0;i<items.length;i++){
      var item = items[i];
      if(!item.time) continue;
      var itemDate = new Date(item.time.replace(/-/g,'/'));
      var isTransfer = item.type === 'transfer';
      if(item.time.slice(0,10)===todayStr && isTransfer) todayCount++;
      if(itemDate >= sevenDaysAgo && isTransfer){
        days7Total++;
        if(item.status === 'ok' || item.status === 'success' || item.status === 'empty') days7OK++;
        else days7Fail++;
      }
      if(isTransfer && !lastTransfer){
        lastTransfer = item;
      }
    }
    document.getElementById('dashToday').textContent = todayCount||'-';
    if(lastTransfer){
      var statusEl = document.getElementById('dashLastStatus');
      var timeEl = document.getElementById('dashLastTime');
      var isOK = lastTransfer.status === 'ok' || lastTransfer.status === 'success' || lastTransfer.status === 'empty';
      if(lastTransfer.status === 'empty'){
        statusEl.textContent = '📭 无新增';
        statusEl.className = 'num';
      }else if(isOK){
        statusEl.textContent = '✅ 成功';
        statusEl.className = 'num';
      }else{
        if(lastTransfer.data && lastTransfer.data.results){
          var okCnt = lastTransfer.data.results.filter(function(r){return r.status==='ok'||r.status==='done'}).length;
          if(okCnt > 0){
            statusEl.textContent = '⚡ 部分成功';
            statusEl.className = 'num';
          }else{
            statusEl.textContent = '❌ 失败';
            statusEl.className = 'num red';
          }
        }else{
          statusEl.textContent = '❌ 失败';
          statusEl.className = 'num red';
        }
      }
      statusEl.style.cssText = 'font-size:15px;font-weight:400;text-align:center;line-height:1.2;margin-top:20px;transform:translateX(-3px)';
      timeEl.textContent = lastTransfer.time.slice(5, 16);
    }else{
      var dashStatusEl = document.getElementById('dashLastStatus');
      dashStatusEl.textContent = '-';
      dashStatusEl.style.cssText = 'font-size:15px;font-weight:400;margin-top:20px;transform:translateX(-3px)';
      document.getElementById('dashLastTime').textContent = '上次转存';
    }
    document.getElementById('dash7OK').textContent = days7OK;
    document.getElementById('dash7Fail').textContent = days7Fail;
    document.getElementById('dash7Total').textContent = days7Total;
    try{var v=await apiGet('/version');if(v.version)document.getElementById('headerVersion').textContent='v'+v.version}catch(e){}
  }catch(e){}
}

// ============ Init ============
function initTimeSelects(){
  var hours=['schedTHour','schedEHour'];
  var mins=['schedTMin','schedEMin'];
  for(var h=0;h<hours.length;h++){
    var sel=document.getElementById(hours[h]);
    if(sel)for(var i=0;i<24;i++){var o=document.createElement('option');o.value=i;o.textContent=String(i).padStart(2,'0');sel.appendChild(o)}
  }
  for(var m=0;m<mins.length;m++){
    var sel2=document.getElementById(mins[m]);
    if(sel2)for(var i=0;i<60;i+=5){var o2=document.createElement('option');o2.value=i;o2.textContent=String(i).padStart(2,'0');sel2.appendChild(o2)}
  }
}

async function init(){
  initTheme(); initTimeSelects();
  try{C = await apiGet('/api/categories')}
  catch(e){showToast('认证失败，请重新登录',false);setTimeout(function(){location.href='/login.html'},1500);return}
  parseCategories(); parseSchedCats(); loadSchedule(); loadExecHistory();
  checkRunningStatus(); loadDashboard();
  initSSE();
}

function initSSE(){
  if(!window.EventSource) return;
  var es = new EventSource('/api/sse');
  es.addEventListener('schedule_update', function(){
    loadDashboard();
  });
  es.addEventListener('config_update', function(){
    loadConfig();
  });
  es.addEventListener('history_update', function(){
    loadExecHistory();
  });
  es.addEventListener('transfer_progress', function(e){
    var d=JSON.parse(e.data);
    if(d.stats){
      document.getElementById('stSearched').textContent=d.stats.searched||0;
      document.getElementById('stOK').textContent=d.stats.ok||0;
      document.getElementById('stSkip').textContent=d.stats.skipped||0;
      document.getElementById('stFail').textContent=d.stats.failed||0;
      document.getElementById('stTotal').textContent=d.stats.total||0;
      updateProgress(d.stats);
    }
    if(d.running)document.getElementById('stopBtn').style.display='inline-block';
  });
  es.addEventListener('log', function(e){
    var d=JSON.parse(e.data);
    if(d.line)addLog(d.line);
  });
  es.onerror = function(){
    es.close();
    setTimeout(initSSE, 5000);
  };
}
init();
</script>
