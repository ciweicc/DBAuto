<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>豆瓣自动转存 - 登录</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0a0f; --bg-deep:#05050a; --card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1); --border3:rgba(255,255,255,.15);
  --text:#ffffff; --text2:rgba(255,255,255,.65); --text3:rgba(255,255,255,.4); --text4:rgba(255,255,255,.25);
  --accent:#0a84ff; --accent2:#5e5ce6; --accent3:#8585ff;
  --green:#30d158; --red:#ff453a; --orange:#ff9f0a; --purple:#bf5af2; --cyan:#64d2ff;
  --radius:20px; --radius-sm:14px; --radius-xs:10px; --radius-lg:24px; --radius-xl:28px;
  --blur:saturate(180%) blur(24px);
  --blur-xl:saturate(200%) blur(40px);
  --shadow:0 8px 32px rgba(0,0,0,.35);
  --shadow-sm:0 4px 12px rgba(0,0,0,.2);
  --shadow-glow:0 0 40px rgba(10,132,255,.2);
  --font-display:'Space Grotesk',-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
  --space-xs:4px; --space-sm:8px; --space-md:12px; --space-lg:16px; --space-xl:20px; --space-2xl:24px; --space-3xl:32px;
  --transition-fast:.15s cubic-bezier(.4,0,.2,1);
  --transition-normal:.25s cubic-bezier(.4,0,.2,1);
  --transition-slow:.4s cubic-bezier(.34,1.56,.64,1);
  --ease-bounce:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="light"] {
  --bg:#f5f5f7; --bg-deep:#ebebef; --card:rgba(255,255,255,.85);
  --border:rgba(0,0,0,.06); --border2:rgba(0,0,0,.1); --border3:rgba(0,0,0,.15);
  --text:#1c1c1e; --text2:rgba(0,0,0,.55); --text3:rgba(0,0,0,.35); --text4:rgba(0,0,0,.2);
  --accent:#007aff; --accent2:#5856d6; --accent3:#8e8dff;
  --green:#34c759; --red:#ff3b30; --orange:#ff9500; --purple:#af52de; --cyan:#00a3ff;
  --shadow:0 4px 20px rgba(0,0,0,.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,.04);
  --shadow-glow:0 0 30px rgba(0,122,255,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;line-height:1.5;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 20% -10%,rgba(10,132,255,.2) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 90% 20%,rgba(191,90,242,.15) 0%,transparent 55%),
    radial-gradient(ellipse 70% 50% at 50% 120%,rgba(48,209,88,.1) 0%,transparent 60%);
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.06'/%3E%3C/svg%3E");
  opacity:.6;mix-blend-mode:overlay;
}
@keyframes auroraFloat{
  0%,100%{transform:translate(0,0) scale(1)}
  33%{transform:translate(40px,-30px) scale(1.1)}
  66%{transform:translate(-30px,20px) scale(.95)}
}
.aurora-glow{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.aurora-glow::before,.aurora-glow::after{
  content:'';position:absolute;width:500px;height:500px;border-radius:50%;filter:blur(100px);opacity:.2;
  animation:auroraFloat 25s ease-in-out infinite;
}
.aurora-glow::before{
  background:radial-gradient(circle,rgba(10,132,255,.6) 0%,transparent 70%);
  top:-150px;left:-100px;
}
.aurora-glow::after{
  background:radial-gradient(circle,rgba(191,90,242,.5) 0%,transparent 70%);
  bottom:-150px;right:-100px;animation-delay:-12s;
}

.icon{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0}
.icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-16{width:16px;height:16px}
.icon-18{width:18px;height:18px}
.icon-20{width:20px;height:20px}
.icon-24{width:24px;height:24px}

.login-wrap{
  position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;
  animation:wrapIn .8s var(--ease-bounce) both;
}
@keyframes wrapIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}

.login-logo{
  width:72px;height:72px;border-radius:20px;margin-bottom:var(--space-2xl);
  background:linear-gradient(135deg,var(--accent),var(--purple));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 12px 40px rgba(10,132,255,.35);
  animation:logoFloat 3s ease-in-out infinite;
  position:relative;overflow:hidden;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}
.login-logo::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.3),transparent 50%);
  animation:logoShine 3s ease-in-out infinite;
}
@keyframes logoShine{
  0%,100%{transform:translateX(-100%) rotate(45deg)}
  50%{transform:translateX(100%) rotate(45deg)}
}
.login-logo svg{width:36px;height:36px;color:#fff;position:relative;z-index:1}

.login-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);
  padding:var(--space-3xl) var(--space-2xl);width:400px;max-width:92%;position:relative;z-index:1;
  -webkit-backdrop-filter:var(--blur-xl);backdrop-filter:var(--blur-xl);
  box-shadow:var(--shadow),var(--shadow-glow);
  transition:all var(--transition-normal);
  overflow:hidden;
}
.login-card::before{
  content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:120px;height:3px;border-radius:0 0 3px 3px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--purple),transparent);
}
.login-card:hover{
  border-color:var(--border2);
  box-shadow:var(--shadow),0 0 60px rgba(10,132,255,.2);
}
.login-card h1{
  font-size:26px;font-weight:700;letter-spacing:-.5px;text-align:center;margin-bottom:var(--space-sm);
  font-family:var(--font-display);
  background:linear-gradient(135deg,rgba(255,255,255,.95) 0%,rgba(100,210,255,.9) 50%,rgba(200,150,255,.85) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[data-theme="light"] .login-card h1{
  background:linear-gradient(135deg,rgba(28,28,30,.9) 0%,rgba(0,122,255,.85) 50%,rgba(175,82,222,.8) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.login-subtitle{
  text-align:center;font-size:13px;color:var(--text3);margin-bottom:var(--space-2xl);
  font-weight:500;
}

.theme-btn{
  position:absolute;top:var(--space-md);right:var(--space-md);
  width:40px;height:40px;border-radius:12px;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  transition:all var(--transition-normal);z-index:2;
}
.theme-btn:hover{background:rgba(10,132,255,.1);border-color:var(--accent);color:var(--accent);
  transform:translateY(-2px) scale(1.05);box-shadow:0 6px 16px rgba(10,132,255,.2);
}
.theme-btn:active{transform:translateY(0) scale(.95)}

.form-group{margin-bottom:var(--space-lg);position:relative}
.form-group label{
  display:block;font-size:12px;color:var(--text2);margin-bottom:var(--space-xs);
  font-weight:600;font-family:var(--font-display);letter-spacing:.3px;
  transition:all var(--transition-fast);
}
.form-group:focus-within label{color:var(--accent)}
.form-group .input-wrap{position:relative}
.form-group input{
  width:100%;padding:14px 16px 14px 44px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:rgba(255,255,255,.03);
  color:var(--text);font-size:15px;font-family:var(--font);
  transition:all var(--transition-normal);
}
[data-theme="light"] .form-group input{background:rgba(0,0,0,.02)}
.form-group input::placeholder{color:var(--text4)}
.form-group input:hover{border-color:var(--border2)}
.form-group input:focus{
  outline:none;border-color:var(--accent);
  box-shadow:0 0 0 4px rgba(10,132,255,.15),0 0 24px rgba(10,132,255,.1);
  background:rgba(255,255,255,.05);
}
.form-group .input-icon{
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  color:var(--text3);transition:color var(--transition-fast);
}
.form-group:focus-within .input-icon{color:var(--accent)}
.form-group .toggle-pass{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  width:32px;height:32px;border-radius:8px;border:none;background:transparent;
  color:var(--text3);cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition-fast);
}
.form-group .toggle-pass:hover{color:var(--accent);background:rgba(10,132,255,.08)}

.btn{
  width:100%;padding:15px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:var(--space-sm);font-family:var(--font-display);
  transition:all var(--transition-normal);
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:var(--space-sm);
  box-shadow:0 6px 20px rgba(10,132,255,.3);
  letter-spacing:.3px;
}
.btn::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,255,255,.25),transparent 50%);
  transform:translateX(-100%);transition:transform .6s ease;
}
.btn:hover::before{transform:translateX(100%)}
.btn:hover{filter:brightness(1.08);box-shadow:0 10px 32px rgba(10,132,255,.4);transform:translateY(-2px)}
.btn:active{transform:translateY(0) scale(.97)}
.btn:disabled{opacity:.6;cursor:not-allowed;box-shadow:none;transform:none}

.error{color:var(--red);font-size:13px;text-align:center;margin-top:var(--space-md);
  display:none;padding:12px;border-radius:var(--radius-xs);
  background:rgba(255,69,58,.08);border:1px solid rgba(255,69,58,.2);
  font-weight:500;
}
.error.show{display:block;animation:errorShake .4s ease, errorFadeIn .3s ease}
@keyframes errorShake{
  0%,100%{transform:translateX(0)}
  20%{transform:translateX(-6px)}
  40%{transform:translateX(6px)}
  60%{transform:translateX(-4px)}
  80%{transform:translateX(4px)}
}
@keyframes errorFadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}

.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:4px;transition:background .2s ease}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1)}
[data-theme="light"] ::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.18)}

.login-footer{
  margin-top:var(--space-2xl);text-align:center;font-size:12px;color:var(--text4);
  animation:fadeUp .8s var(--ease-bounce) both;animation-delay:.4s;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:480px){
  .login-card{width:94%;padding:var(--space-2xl) var(--space-xl)}
  .login-card h1{font-size:22px}
}
</style>
</head>
<body>
<div class="aurora-glow"></div>
<svg class="icons-sprite" style="display:none">
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <path d="M12 1v2"/><path d="M12 21v2"/><path d="m4.22 4.22 1.42 1.42"/><path d="m18.36 18.36 1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="m6.34 17.66-1.42 1.42"/><path d="m19.78 4.22-1.42 1.42"/>
  </symbol>
  <symbol id="icon-user" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
    <circle cx="12" cy="7" r="4"/>
  </symbol>
  <symbol id="icon-lock" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
  </symbol>
  <symbol id="icon-eye" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/>
    <circle cx="12" cy="12" r="3"/>
  </symbol>
  <symbol id="icon-eye-off" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/>
    <path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/>
    <path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/>
    <line x1="2" x2="22" y1="2" y2="22"/>
  </symbol>
  <symbol id="icon-movie" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
    <line x1="7" y1="3" x2="7" y2="21"/><line x1="17" y1="3" x2="17" y2="21"/>
    <line x1="3" y1="7" x2="21" y2="7"/><line x1="3" y1="17" x2="21" y2="17"/>
  </symbol>
</svg>

<div class="login-wrap">
  <div class="login-logo">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><use href="#icon-movie"/></svg>
  </div>
  <div class="login-card">
    <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题"><span class="icon icon-20"><svg><use href="#icon-moon"/></svg></span></button>
    <h1>豆瓣自动转存</h1>
    <p class="login-subtitle">登录以管理您的影视自动转存</p>
    <div class="form-group">
      <label>用户名</label>
      <div class="input-wrap">
        <span class="input-icon"><span class="icon icon-18"><svg><use href="#icon-user"/></svg></span></span>
        <input type="text" id="user" placeholder="请输入用户名" onkeydown="if(event.key==='Enter')focusPass()">
      </div>
    </div>
    <div class="form-group">
      <label>密码</label>
      <div class="input-wrap">
        <span class="input-icon"><span class="icon icon-18"><svg><use href="#icon-lock"/></svg></span></span>
        <input type="password" id="pass" placeholder="请输入密码" onkeydown="if(event.key==='Enter')login()">
        <button class="toggle-pass" onclick="togglePass()" title="显示/隐藏密码" id="passToggleBtn">
          <span class="icon icon-16"><svg><use href="#icon-eye"/></svg></span>
        </button>
      </div>
    </div>
    <button class="btn" id="btn" onclick="login()">登 录</button>
    <div class="error" id="error"></div>
  </div>
  <p class="login-footer">安全登录 · 数据本地加密存储</p>
</div>

<script>
var passVisible = false;

function initTheme(){
  var t = localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  var icon = t==='dark'?'icon-moon':'icon-sun';
  document.querySelector('#themeBtn .icon').innerHTML = '<svg><use href="#'+icon+'"/></svg>';
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  var icon = next==='dark'?'icon-moon':'icon-sun';
  document.querySelector('#themeBtn .icon').innerHTML = '<svg><use href="#'+icon+'"/></svg>';
}
initTheme();

function focusPass(){document.getElementById('pass').focus()}

function togglePass(){
  passVisible = !passVisible;
  var input = document.getElementById('pass');
  var btn = document.getElementById('passToggleBtn');
  input.type = passVisible ? 'text' : 'password';
  btn.innerHTML = '<span class="icon icon-16"><svg><use href="#'+(passVisible?'icon-eye-off':'icon-eye')+'"/></svg></span>';
}

if(localStorage.getItem('auth_token')){
  var tok = localStorage.getItem('auth_token');
  fetch('/api/categories',{headers:{'X-Auth-Token':tok}}).then(function(r){
    if(r.ok)location.href='/';
    else localStorage.removeItem('auth_token');
  });
}

async function login(){
  var user = document.getElementById('user').value.trim();
  var pass = document.getElementById('pass').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('error');
  var success = false;
  
  err.classList.remove('show');
  if(!user){err.textContent='请输入用户名';err.classList.add('show');return}
  if(!pass){err.textContent='请输入密码';err.classList.add('show');return}
  
  btn.disabled = true; 
  btn.innerHTML = '<span class="spinner"></span> 登录中...';
  
  try{
    var r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    var d = await r.json();
    if(d.success){
      success = true;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg> 登录成功';
      localStorage.setItem('auth_token',d.token);
      setTimeout(function(){location.href='/'},500);
    }else{
      err.textContent = d.message||'登录失败，请检查用户名和密码';
      err.classList.add('show');
    }
  }catch(e){
    err.textContent = '网络连接失败，请检查网络';
    err.classList.add('show');
  }
  if(!success){
    btn.disabled = false; 
    btn.innerHTML = '登 录';
  }
}
</script>
</body>
</html>
