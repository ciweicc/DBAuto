<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>豆瓣自动转存 - 登录</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<style>
:root {
  --bg:#0a0a0f; --bg2:rgba(255,255,255,.03); --bg3:rgba(255,255,255,.05); --card:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.06); --border2:rgba(255,255,255,.1); --border3:rgba(255,255,255,.15);
  --text:#ffffff; --text2:rgba(255,255,255,.65); --text3:rgba(255,255,255,.4); --text4:rgba(255,255,255,.25);
  --accent:#0a84ff; --accent2:#5e5ce6; --accent3:#8585ff;
  --green:#30d158; --red:#ff453a; --orange:#ff9f0a; --purple:#bf5af2;
  --radius:20px; --radius-sm:14px; --radius-xs:10px; --radius-lg:24px;
  --blur:saturate(180%) blur(24px);
  --shadow:0 8px 32px rgba(0,0,0,.35);
  --shadow-sm:0 4px 12px rgba(0,0,0,.2);
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;
  --space-xs:4px; --space-sm:8px; --space-md:12px; --space-lg:16px; --space-xl:20px; --space-2xl:24px;
  --transition-fast:.12s ease; --transition-normal:.2s ease; --transition-slow:.3s ease;
}
[data-theme="light"] {
  --bg:#f5f5f7; --bg2:rgba(255,255,255,.6); --bg3:rgba(255,255,255,.8); --card:rgba(255,255,255,.92);
  --border:rgba(0,0,0,.06); --border2:rgba(0,0,0,.1); --border3:rgba(0,0,0,.15);
  --text:#1c1c1e; --text2:rgba(0,0,0,.55); --text3:rgba(0,0,0,.35); --text4:rgba(0,0,0,.2);
  --accent:#007aff; --accent2:#5856d6; --accent3:#8e8dff;
  --green:#34c759; --red:#ff3b30; --orange:#ff9500; --purple:#af52de;
  --shadow:0 4px 20px rgba(0,0,0,.06);
  --shadow-sm:0 2px 8px rgba(0,0,0,.04);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;line-height:1.5;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 20% 0%,rgba(10,132,255,.15) 0%,transparent 50%),
             radial-gradient(ellipse at 80% 100%,rgba(191,90,242,.1) 0%,transparent 50%),
             radial-gradient(ellipse at 50% 50%,rgba(94,92,230,.05) 0%,transparent 60%);
}

/* SVG Icon */
.icon{display:inline-flex;align-items:center;justify-content:center;vertical-align:middle;flex-shrink:0}
.icon svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.icon-16{width:16px;height:16px}
.icon-18{width:18px;height:18px}
.icon-20{width:20px;height:20px}
.icon-24{width:24px;height:24px}

.login-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);
  padding:var(--space-2xl) var(--space-xl);width:380px;max-width:92%;position:relative;z-index:1;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  box-shadow:var(--shadow);transition:all var(--transition-normal);
}
.login-card:hover{border-color:var(--border2)}
.login-card h1{
  font-size:28px;font-weight:700;letter-spacing:2px;text-align:center;margin-bottom:var(--space-2xl);
  display:flex;align-items:center;justify-content:center;gap:var(--space-md);
  background:linear-gradient(135deg,rgba(255,255,255,.95) 0%,rgba(120,190,255,.9) 50%,rgba(200,150,255,.85) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
[data-theme="light"] .login-card h1{
  background:linear-gradient(135deg,rgba(60,60,70,.9) 0%,rgba(0,122,255,.8) 50%,rgba(175,82,222,.7) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.theme-btn{
  position:absolute;top:var(--space-md);right:var(--space-md);
  width:38px;height:38px;border-radius:50%;border:1px solid var(--border);
  background:var(--card);color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-backdrop-filter:var(--blur);backdrop-filter:var(--blur);
  transition:all var(--transition-normal);
}
.theme-btn:hover{background:rgba(10,132,255,.1);border-color:var(--accent);color:var(--accent);transform:scale(1.05)}
.theme-btn:active{transform:scale(0.95)}
.form-group{margin-bottom:var(--space-lg)}
.form-group label{display:block;font-size:13px;color:var(--text2);margin-bottom:var(--space-xs);font-weight:500}
.form-group input{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border);background:rgba(255,255,255,.03);
  color:var(--text);font-size:15px;font-family:var(--font);
  transition:all var(--transition-fast);
}
[data-theme="light"] .form-group input{background:rgba(0,0,0,.02)}
.form-group input::placeholder{color:var(--text4)}
.form-group input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 4px rgba(10,132,255,.12);background:rgba(255,255,255,.05)}
.btn{
  width:100%;padding:14px;border-radius:var(--radius-sm);border:none;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-size:15px;font-weight:600;
  cursor:pointer;margin-top:var(--space-sm);font-family:var(--font);transition:all var(--transition-normal);
  position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;gap:var(--space-sm);
  box-shadow:0 4px 16px rgba(10,132,255,.3);
}
.btn::after{
  content:'';position:absolute;inset:0;background:rgba(255,255,255,.1);opacity:0;
  transform:scale(0);border-radius:inherit;transition:all var(--transition-normal);
}
.btn:active::after{opacity:1;transform:scale(1)}
.btn:hover{filter:brightness(1.08);box-shadow:0 6px 20px rgba(10,132,255,.4)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5;cursor:not-allowed;box-shadow:none}
.error{color:var(--red);font-size:13px;text-align:center;margin-top:var(--space-md);display:none;padding:var(--space-sm);border-radius:var(--radius-xs);background:rgba(255,69,58,.08)}
.error.show{display:block;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* Loading Spinner */
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* Scrollbar */
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.2)}
[data-theme="light"] ::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1)}
</style>
</head>
<body>
<svg class="icons-sprite" style="display:none">
  <symbol id="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
  </symbol>
  <symbol id="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="12" cy="12" r="5"/>
    <path d="M12 1v2"/><path d="M12 21v2"/><path d="m4.22 4.22 1.42 1.42"/><path d="m18.36 18.36 1.42 1.42"/><path d="M1 12h2"/><path d="M21 12h2"/><path d="m6.34 17.66-1.42 1.42"/><path d="m19.78 4.22-1.42 1.42"/>
  </symbol>
</svg>
<div class="login-card">
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题"><span class="icon icon-20"><svg><use href="#icon-moon"/></svg></span></button>
  <h1><img src="/static/favicon.svg" style="width:28px;height:28px;border-radius:8px">豆瓣自动转存</h1>
  <div class="form-group">
    <label>用户名</label>
    <input type="text" id="user" placeholder="root" onkeydown="if(event.key==='Enter')login()">
  </div>
  <div class="form-group">
    <label>密码</label>
    <input type="password" id="pass" placeholder="密码" onkeydown="if(event.key==='Enter')login()">
  </div>
  <button class="btn" id="btn" onclick="login()">登录</button>
  <div class="error" id="error"></div>
</div>
<script>
function initTheme(){
  var t = localStorage.getItem('theme')||'dark';
  document.documentElement.setAttribute('data-theme',t);
  var themeBtn = document.querySelector('#themeBtn .icon');
  themeBtn.innerHTML = t==='dark'?'<svg><use href="#icon-moon"/></svg>':'<svg><use href="#icon-sun"/></svg>';
}
function toggleTheme(){
  var cur = document.documentElement.getAttribute('data-theme');
  var next = cur==='dark'?'light':'dark';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  var themeBtn = document.querySelector('#themeBtn .icon');
  themeBtn.innerHTML = next==='dark'?'<svg><use href="#icon-moon"/></svg>':'<svg><use href="#icon-sun"/></svg>';
}
initTheme();

if(localStorage.getItem('auth_token')){
  var tok = localStorage.getItem('auth_token');
  fetch('/api/categories',{headers:{'X-Auth-Token':tok}}).then(function(r){
    if(r.ok)location.href='/';
    else localStorage.removeItem('auth_token');
  });
}

async function login(){
  var user = document.getElementById('user').value.trim();
  var pass = document.getElementById('pass').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('error');
  
  err.classList.remove('show');
  if(!user){err.textContent='请输入用户名';err.classList.add('show');return}
  if(!pass){err.textContent='请输入密码';err.classList.add('show');return}
  
  btn.disabled = true; 
  btn.innerHTML = '<span class="spinner"></span> 登录中...';
  
  try{
    var r = await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:user,password:pass})});
    var d = await r.json();
    if(d.success){
      localStorage.setItem('auth_token',d.token);
      location.href = '/';
    }else{
      err.textContent = d.message||'登录失败';
      err.classList.add('show');
    }
  }catch(e){
    err.textContent = '网络错误';
    err.classList.add('show');
  }
  btn.disabled = false; 
  btn.innerHTML = '登 录';
}
</script>
</body>
</html>
